<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Grosvenor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap');

        body {
            font-family: 'Bitcount Single', monospace;
            background-color: white;
            color: #555555;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
            text-align: center;
            line-height: 1.6;
        }

        .card {
            max-width: 600px;
            padding: 2rem;
        }

        .card h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #333333;
        }

        .card p {
            font-size: 1.1rem;
            margin: 0.5rem 0;
        }

        .card a {
            color: #555555;
            text-decoration: none;
        }

        .card a:hover {
            color: #333333;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Paul Grosvenor</h1>
        <p>contact[at]paulgrosvenor.com</p>
        <p><a href="https://soundcloud.com/paul-a-o-grosvenor/" target="_blank">soundcloud.com</a></p>
    </div>
</body>
</html>
